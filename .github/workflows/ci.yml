name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          pip install ruff
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check api/ crawler/

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps
        run: cd frontend && npm install

      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

      - name: ESLint
        run: cd frontend && npx eslint src/ --ext .ts,.tsx --max-warnings=0 || true

      - name: Build frontend
        run: cd frontend && npm run build
